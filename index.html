<!DOCTYPE html>
<html lang="ko">
<head>

<title>카페24 PRO 웨비나</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BSZWXLY5DE"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-BSZWXLY5DE', { send_page_view: false });

// Parse URL parameters
const params = new URLSearchParams(window.location.search);
const target = params.get('to');

if (target) {
  // Send GA4 event before redirect
  gtag('event', 'outbound_click', {
    'link_url': target,
    'utm_source': params.get('utm_source') || '',
    'utm_medium': params.get('utm_medium') || '',
    'utm_campaign': params.get('utm_campaign') || '',
    'utm_content': params.get('utm_content') || ''
  });

  // Redirect after brief delay to ensure GA4 event fires
  setTimeout(function() {
    window.location.href = target;
  }, 300);
} else {
  // No redirect target - show landing page (fire page_view only here)
  gtag('event', 'page_view', { page_title: '카페24 PRO 웨비나 랜딩' });
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('landing').style.display = 'block';
  });
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #7c3aed; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
#loading { text-align: center; }
#loading p { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 12px; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
#landing { display: none; text-align: center; max-width: 500px; padding: 40px; }
#landing h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
#landing p { font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.7; margin-bottom: 24px; }
#landing a { display: inline-block; background: white; color: #7c3aed; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; }
#landing a:hover { background: #f5f3ff; }
</style>
</head>

<div id="loading">
